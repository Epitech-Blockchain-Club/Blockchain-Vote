services:
  # 1. Backend API (Web Service)
  - type: web
    name: blockchain-vote-api
    env: docker
    dockerContext: backend
    dockerfilePath: Dockerfile.render
    plan: free # Force free plan for trial
    envVars:
      - key: PORT
        value: 3001
      - key: PRIVATE_KEY
        value: 0x1fb3cee9bedf6bc21ebda1ded51fba4814cbe0e9937e1c4da1c72e9ea46f2982
      - key: MONGO_URI
        sync: false # User should set their MongoDB Atlas URI in Render Dashboard
        placeholder: "mongodb+srv://..."
      - key: FRONTEND_URL
        fromService:
          type: static
          name: blockchain-vote-web
          property: url

  # 2. Frontend App (Static Site)
  - type: web
    name: blockchain-vote-web
    env: static
    buildCommand: npm install && npm run build
    buildContext: frontend
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: blockchain-vote-api
          property: url
