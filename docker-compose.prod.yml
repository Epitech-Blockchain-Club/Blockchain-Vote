services:
  mongodb:
    image: mongo:6.0
    container_name: votechain-mongodb
    restart: always
    stop_grace_period: 30s
    env_file:
      - ./backend/.env.production
    volumes:
      - votechain-mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - votechain_net

  besu-node:
    image: hyperledger/besu:24.12.1
    container_name: votechain-besu
    restart: always
    stop_grace_period: 60s
    environment:
      - BESU_OPTS=-Xmx2g
    command: [
      "--network=dev",
      "--rpc-http-enabled",
      "--rpc-http-host=0.0.0.0",
      "--rpc-http-port=8545",
      "--rpc-http-cors-origins=*",
      "--rpc-http-api=WEB3,ETH,NET,MINER",
      "--host-allowlist=*",
      "--discovery-enabled=false",
      "--miner-enabled",
      "--miner-coinbase=0xfe3b557e8fb62b89f4916b721be55ceb828dbd73",
      "--data-path=/opt/besu/data"
    ]
    volumes:
      - votechain-besu-data:/opt/besu/data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/8545' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - votechain_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: votechain-backend
    restart: always
    stop_grace_period: 15s
    depends_on:
      mongodb:
        condition: service_healthy
      besu-node:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    ports:
      - "3001:3001"
    volumes:
      - votechain-app-data:/app/data
    networks:
      - votechain_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_APP_ENV=${VITE_APP_ENV:-production}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-681526645303-f0kn1mt7cuh1i1d2lbt9gs1quru438o6.apps.googleusercontent.com}
        - VITE_MICROSOFT_CLIENT_ID=${VITE_MICROSOFT_CLIENT_ID:-c4771f6c-58bf-45c1-84c4-b8d04a75fc99}
        - VITE_MICROSOFT_TENANT_ID=${VITE_MICROSOFT_TENANT_ID:-901cb4ca-b862-4029-9306-e5cd0f6d9f86}
    env_file:
      - ./frontend/.env.production
    container_name: votechain-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - votechain_net

volumes:
  votechain-mongo-data:
    name: votechain-mongo-data
  votechain-besu-data:
    name: votechain-besu-data
  votechain-app-data:
    name: votechain-app-data

networks:
  votechain_net:
    driver: bridge
