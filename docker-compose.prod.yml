services:
  mongodb:
    image: mongo:6.0
    container_name: epivote-mongodb
    restart: always
    stop_grace_period: 30s
    env_file:
      - ./backend/.env.production
    volumes:
      - epivote-mongo-data:/data/db
      - epivote-mongo-configdb:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - epivote_net

  besu-node:
    image: hyperledger/besu:24.12.1
    container_name: epivote-besu
    restart: always
    stop_grace_period: 60s
    environment:
      - BESU_OPTS=-Xmx2g
    command: [
      "--network=dev",
      "--rpc-http-enabled",
      "--rpc-http-host=0.0.0.0",
      "--rpc-http-port=8545",
      "--rpc-http-cors-origins=*",
      "--rpc-http-api=WEB3,ETH,NET,MINER",
      "--host-allowlist=*",
      "--discovery-enabled=false",
      "--miner-enabled",
      "--miner-coinbase=0xfe3b557e8fb62b89f4916b721be55ceb828dbd73",
      "--data-path=/opt/besu/data"
    ]
    volumes:
      - epivote-besu-data:/opt/besu/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8545"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    networks:
      - epivote_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epivote-backend
    restart: always
    stop_grace_period: 15s
    depends_on:
      mongodb:
        condition: service_healthy
      besu-node:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    volumes:
      - epivote-backend-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 180s
    networks:
      - epivote_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_APP_ENV=${VITE_APP_ENV:-production}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID:-681526645303-f0kn1mt7cuh1i1d2lbt9gs1quru438o6.apps.googleusercontent.com}
        - VITE_MICROSOFT_CLIENT_ID=${VITE_MICROSOFT_CLIENT_ID:-c4771f6c-58bf-45c1-84c4-b8d04a75fc99}
        - VITE_MICROSOFT_TENANT_ID=${VITE_MICROSOFT_TENANT_ID:-901cb4ca-b862-4029-9306-e5cd0f6d9f86}
    env_file:
      - ./frontend/.env.production
    container_name: epivote-frontend
    restart: always
    ports:
      - "5001:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - epivote_net

volumes:
  epivote-mongo-data:
    name: epivote-mongo-data
  epivote-mongo-configdb:
    name: epivote-mongo-configdb
  epivote-besu-data:
    name: epivote-besu-data
  epivote-backend-data:
    name: epivote-backend-data

networks:
  epivote_net:
    driver: bridge
